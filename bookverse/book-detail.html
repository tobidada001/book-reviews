<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book — BookVerse</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .book-detail-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2.5rem clamp(1.25rem, 4vw, 3rem);
    }

    .book-detail-sidebar {
      position: sticky;
      top: 84px;
    }

    .book-meta-pills {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin: 1.5rem 0;
      padding: 1.25rem;
      background: var(--bg3);
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
    }

    .meta-row .label { color: var(--text-dim); }
    .meta-row .value { color: var(--text-sub); font-weight: 500; }

    .reviews-section {
      margin-top: 3rem;
    }

    .reviews-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .reviews-section-header h2 {
      font-size: 1.5rem;
    }

    .login-prompt {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-prompt p {
      color: var(--text-sub);
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }

    .login-prompt-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
    }

    .review-card { margin-bottom: 0; }

    .review-actions .btn {
      padding: 0.35rem 0.7rem;
      font-size: 0.78rem;
    }

    .already-reviewed {
      background: rgba(34,197,94,0.08);
      border: 1px solid rgba(34,197,94,0.2);
      border-radius: var(--radius-sm);
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      color: var(--green);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
  </style>
</head>
<body>
  <!-- NAV -->
  <nav class="nav">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon">📚</div>
      Book<span>Verse</span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html" data-page="home">Home</a></li>
      <li><a href="books.html" data-page="books">Books</a></li>
    </ul>
    <div class="nav-actions" id="nav-actions"></div>
  </nav>

  <main class="book-detail-wrap page-fade-in" id="main-content">
    <div id="book-content">
      <div style="text-align:center;padding:4rem;color:var(--text-dim)">
        <div class="loading-spinner"></div>
        <p style="margin-top:1rem">Loading book…</p>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <div class="footer-logo">📚 BookVerse</div>
    <p>© 2026 BookVerse. Celebrating stories that matter.</p>
  </footer>

  <script src="app.js"></script>
  <script>
    initNav('books');

    const bookId = getParam('id');
    if (!bookId) {
      window.location.href = 'books.html';
    }

    const book = getBookById(bookId);
    if (!book) {
      document.getElementById('book-content').innerHTML = `
        <div class="empty-state">
          <div class="icon">📖</div>
          <h3>Book not found</h3>
          <p><a href="books.html" style="color:var(--accent2)">Back to books</a></p>
        </div>
      `;
    } else {
      renderPage();
    }

    function renderPage() {
      const user = getCurrentUser();
      const reviews = getReviewsForBook(bookId);
      const avg = getAverageRating(bookId);
      const userReview = user ? reviews.find(r => r.userId === user.id) : null;

      document.title = `${book.title} — BookVerse`;

      document.getElementById('book-content').innerHTML = `
        <div class="breadcrumb">
          <a href="books.html">Books</a>
          <span>›</span>
          <span>${book.title}</span>
        </div>

        <div class="book-detail-layout">
          <!-- Sidebar -->
          <div class="book-detail-sidebar">
            ${book.cover
              ? `<img class="book-detail-cover" src="${book.cover}" alt="${book.title}"
                  onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
              : ''}
            <div class="book-detail-cover-placeholder" style="display:none">📚</div>

            <div style="margin-top:1.25rem;display:flex;flex-direction:column;gap:0.75rem">
              ${user
                ? userReview
                  ? `<div class="already-reviewed">✓ You've reviewed this book</div>`
                  : `<a href="write-review.html?bookId=${bookId}" class="btn btn-primary btn-full btn-lg">✍️ Write a Review</a>`
                : `<a href="login.html?next=${encodeURIComponent('book-detail.html?id='+bookId)}" class="btn btn-primary btn-full btn-lg">Log In to Review</a>`
              }
            </div>

            <div class="book-meta-pills">
              <div class="meta-row">
                <span class="label">Genre</span>
                <span class="value"><span class="badge" data-genre="${book.genre}">${book.genre}</span></span>
              </div>
              <div class="meta-row">
                <span class="label">Year</span>
                <span class="value">${book.year}</span>
              </div>
              <div class="meta-row">
                <span class="label">Pages</span>
                <span class="value">${book.pages}</span>
              </div>
              <div class="meta-row">
                <span class="label">ISBN</span>
                <span class="value" style="font-size:0.78rem">${book.isbn}</span>
              </div>
            </div>
          </div>

          <!-- Main -->
          <div>
            <h1 class="book-detail-title">${book.title}</h1>
            <p class="book-detail-author">by ${book.author}</p>

            <div class="book-detail-meta">
              <div class="rating-big">
                ${renderStars(avg)}
                <span style="font-size:1.1rem">${avg > 0 ? avg.toFixed(1) : '—'}</span>
              </div>
              <span style="color:var(--text-dim);font-size:0.875rem">${reviews.length} review${reviews.length !== 1 ? 's' : ''}</span>
            </div>

            <p class="book-detail-desc">${book.description}</p>

            <!-- Reviews Section -->
            <div class="reviews-section" id="reviews-section">
              <div class="reviews-section-header">
                <h2>Reviews <span class="reviews-count" id="review-count-label">${reviews.length} review${reviews.length !== 1 ? 's' : ''}</span></h2>
              </div>

              ${!user ? `
                <div class="login-prompt">
                  <p>Sign in to leave a review and share your thoughts.</p>
                  <div class="login-prompt-actions">
                    <a href="login.html?next=${encodeURIComponent('book-detail.html?id='+bookId)}" class="btn btn-primary">Log In</a>
                    <a href="register.html" class="btn btn-outline">Sign Up</a>
                  </div>
                </div>
              ` : ''}

              <div class="reviews-list" id="reviews-list">
                ${renderReviews(reviews, user)}
              </div>
            </div>
          </div>
        </div>
      `;
    }

    function renderReviews(reviews, user) {
      if (!reviews.length) {
        return `
          <div class="empty-state">
            <div class="icon">💬</div>
            <h3>No reviews yet</h3>
            <p>Be the first to share your thoughts!</p>
          </div>
        `;
      }

      return reviews.map(r => {
        const isOwn = user && r.userId === user.id;
        const postedAt = new Date(r.createdAt).getTime();
        const now = Date.now();
        const editExpired = (now - postedAt) > 5 * 60 * 1000;
        const canEdit = isOwn && !editExpired;
        const timeLeft = isOwn && !editExpired
          ? Math.max(0, Math.ceil((5 * 60 * 1000 - (now - postedAt)) / 1000))
          : 0;

        return `
          <div class="review-card" id="review-${r.id}">
            <div class="review-card-header">
              <div class="review-author">
                <div class="review-avatar">${getInitial(r.userName)}</div>
                <div>
                  <div class="review-author-name">${r.userName}</div>
                  <div class="review-date">${formatDate(r.createdAt)}</div>
                </div>
              </div>
              <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.4rem">
                ${renderStars(r.rating)}
                ${isOwn ? `
                  <div class="review-actions">
                    ${canEdit ? `<a href="edit-review.html?reviewId=${r.id}" class="btn btn-outline" style="font-size:0.75rem;padding:0.3rem 0.7rem">✏️ Edit</a>` : ''}
                    <button class="btn btn-danger" style="font-size:0.75rem;padding:0.3rem 0.7rem" onclick="handleDeleteReview('${r.id}')">🗑 Delete</button>
                  </div>
                ` : ''}
              </div>
            </div>
            ${r.title ? `<div class="review-title">${r.title}</div>` : ''}
            <div class="review-body">${r.body}</div>
            ${canEdit ? `
              <div class="edit-timer" id="timer-${r.id}">
                ⏱ You can edit for <span id="timer-sec-${r.id}">${timeLeft}</span>s
              </div>
            ` : ''}
          </div>
        `;
      }).join('');
    }

    function handleDeleteReview(reviewId) {
      if (!confirm('Are you sure you want to delete this review? This cannot be undone.')) return;
      deleteReview(reviewId);
      showToast('Review deleted.', 'success');
      renderPage(); // Re-render
    }

    // Countdown timers
    function startTimers() {
      const user = getCurrentUser();
      if (!user) return;
      const reviews = getReviewsForBook(bookId);
      reviews.forEach(r => {
        if (r.userId !== user.id) return;
        const postedAt = new Date(r.createdAt).getTime();
        const timerEl = document.getElementById(`timer-sec-${r.id}`);
        if (!timerEl) return;
        const iv = setInterval(() => {
          const remaining = Math.max(0, Math.ceil((5 * 60 * 1000 - (Date.now() - postedAt)) / 1000));
          timerEl.textContent = remaining;
          if (remaining <= 0) {
            clearInterval(iv);
            renderPage();
          }
        }, 1000);
      });
    }

    // Watch for DOM to be ready then start timers
    const observer = new MutationObserver(() => {
      if (document.getElementById('reviews-list')) {
        startTimers();
      }
    });
    observer.observe(document.getElementById('main-content'), { childList: true, subtree: true });
  </script>
</body>
</html>
